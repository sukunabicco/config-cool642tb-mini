CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_ZMK_BLE=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

CONFIG_BT_DEVICE_NAME_MAX=30

# Battery measurement not possible (XIAO internal divider unusable with
# 4xAAA external power path). BAS disabled to avoid 0% alerts.
CONFIG_ZMK_BATTERY_REPORTING=n

# Sleep disabled - peripheral reconnect after PC wake is unreliable
CONFIG_ZMK_SLEEP=n

# DYA Studio Peripheral settings
CONFIG_ZMK_SETTINGS_RPC=y
CONFIG_ZMK_SPLIT_RELAY_EVENT=y
CONFIG_SETTINGS=y
CONFIG_ZMK_SETTINGS_SAVE_DEBOUNCE=10000
