# USB Central
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y
CONFIG_ZMK_MOUSE=y
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y

# BLE transmit power
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Battery reporting from peripherals
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# ZMK Studio
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# Sleep disabled - USB-powered dongle should stay awake to maintain BLE connections
CONFIG_ZMK_SLEEP=n

# Prospector display
CONFIG_PROSPECTOR_STATUS_SCREEN_OPERATOR=y
CONFIG_PROSPECTOR_USE_AMBIENT_LIGHT_SENSOR=n
CONFIG_PROSPECTOR_FIXED_BRIGHTNESS=80
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_STACK_SIZE=8192
