CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_ZMK_BLE=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_INPUT_PMW3610=y
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y

CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Battery measurement not possible (XIAO internal divider unusable with
# 4xAAA external power path). BAS disabled to avoid 0% alerts.
CONFIG_ZMK_BATTERY_REPORTING=n

# Prospector Scanner advertisement
CONFIG_ZMK_STATUS_ADVERTISEMENT=y
CONFIG_ZMK_STATUS_ADV_KEYBOARD_NAME="cool642tb-mini"

# Sleep disabled - central with trackball has unreliable wake/reconnect
CONFIG_ZMK_SLEEP=n

# ========================================
# DYA Studio settings (Central)
# ========================================
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=y

# Settings RPC
CONFIG_ZMK_SETTINGS_RPC=y
CONFIG_ZMK_SETTINGS_RPC_STUDIO=y

# Split communication
CONFIG_ZMK_SPLIT_RELAY_EVENT=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_SPLIT_RUN_STACK_SIZE=3096

# Settings persistence
CONFIG_SETTINGS=y
CONFIG_ZMK_SETTINGS_SAVE_DEBOUNCE=10000

# Memory (freeze prevention)
CONFIG_HEAP_MEM_POOL_SIZE=24576
CONFIG_BT_RX_STACK_SIZE=2560
CONFIG_BT_HCI_TX_STACK_SIZE=1536
