CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_ZMK_BLE=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# BLE radio scheduling relief (tri-role: peripheral + central + advertiser)
CONFIG_ZMK_SPLIT_BLE_PREF_INT=12

# BLE connection limits
CONFIG_BT_MAX_CONN=6
CONFIG_BT_MAX_PAIRED=6

# BLE supervision timeouts (4s -> 6s)
CONFIG_ZMK_SPLIT_BLE_PREF_TIMEOUT=600
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=600

# BLE thread stack sizes
CONFIG_ZMK_BLE_THREAD_STACK_SIZE=1024
CONFIG_ZMK_SPLIT_BLE_CENTRAL_SPLIT_RUN_STACK_SIZE=768
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=3072

CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y

CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# Prospector Scanner advertisement
CONFIG_ZMK_STATUS_ADVERTISEMENT=y
CONFIG_ZMK_STATUS_ADV_KEYBOARD_NAME="cool642tb-mini"

CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000
